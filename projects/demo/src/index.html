<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Demo</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (function (location) {
      if (location.search[1] !== '/') {
        return;
      }

      var decoded = location.search
        .slice(1)
        .split('&')
        .map(function (part) {
          return part.replace(/~and~/g, '&');
        })
        .join('?');

      window.history.replaceState(null, '', location.pathname.slice(0, -1) + decoded + location.hash);
    }(window.location));
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
