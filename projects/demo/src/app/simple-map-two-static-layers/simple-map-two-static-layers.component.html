<section class="map-container">
  <app-demo-header
    title="Два слоя: точки и линия"
    component="SimpleMapTwoStaticLayersComponent"
    description="Карта с точками и линейным слоем, который можно скрывать и менять его прозрачность."
    [features]="['multiple layers', 'layer visibility toggle', 'opacity control']"
    [interactions]="['Кнопка скрытия слоя', 'Ползунок прозрачности']"
  />

  <button type="button" (click)="toggleLineLayer()">
    {{ lineVisible ? 'Скрыть линию' : 'Показать линию' }}
  </button>

  <label class="opacity-control">
    <span>Прозрачность линии: {{ lineOpacity }}</span>
    <input
      type="range"
      min="0"
      max="1"
      step="0.05"
      [value]="lineOpacity"
      (input)="onLineOpacityInput($event)"
    />
  </label>

  <mff-map-host class="map-canvas" [config]="mapConfig" (ready)="onReady($event)"></mff-map-host>
</section>
